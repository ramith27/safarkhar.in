services:
  postgres:
    image: postgres:16-alpine
    container_name: trip-calculator-db
    ports:
      - "5433:5432"
    environment:
      POSTGRES_USER: tripuser
      POSTGRES_PASSWORD: trippass
      POSTGRES_DB: tripdb
    volumes:
      - pgdata:/var/lib/postgresql/data
    restart: unless-stopped

volumes:
  pgdata:
